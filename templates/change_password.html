{% extends 'base.html' %}
{% block title %}Change Password — ToDo{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <h1>Change Password</h1>
        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button class="btn btn-primary" type="submit" style="width:100%">Change Password</button>
        </form>
    </div>
</div>
{% endblock %}
