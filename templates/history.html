
{% extends 'base.html' %}

{% block title %}Task History{% endblock %}

{% block content %}
    <h1>Task History</h1>
    <a href="{% url 'home' %}">← Back to Home</a>

    {% if history %}
        {% for record in history %}
        <div>
            <p>{{ record.title }} {{ record.action }} {{ record.created_at }}</p>
        </div>
        <hr>
        {% endfor %}

    {% else %}
        <p>No history yet.</p>
    {% endif %}

{% endblock %}
