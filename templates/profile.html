{% extends 'base.html' %}
{% block title %}Profile — ToDo{% endblock %}
{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <a href="{% url 'home' %}">← Back to Home</a>
        <h1>Your Profile</h1>

        <div class="form-group">
            <label>Username</label>
            <input type="text" value="{{ request.user.username }}" disabled>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input type="text" value="{{ request.user.email }}" disabled>
        </div>

        <form method="POST">
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    {{ field.label_tag }}
                    {{ field }}
                    {{ field.errors }}
                </div>
            {% endfor %}
            <button class="btn btn-primary" type="submit" style="width:100%">Update Profile</button>
        </form>

        <p class="auth-footer"><a href="{% url 'change_password' %}">Change Password</a></p>
    </div>
</div>
{% endblock %}
